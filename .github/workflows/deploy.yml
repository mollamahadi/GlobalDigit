name: Deploy Global Digits Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: global-digits-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          test -n "$VPS_HOST" || { echo "Missing secret: VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing secret: VPS_USER"; exit 1; }
          test -n "$VPS_SSH_PRIVATE_KEY" || { echo "Missing secret: VPS_SSH_PRIVATE_KEY"; exit 1; }

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -H "$VPS_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Copy release to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='google-service-account.json' \
            --exclude='*.service-account.json' \
            --exclude='node_modules/' \
            --exclude='data/' \
            --exclude='.git/' \
            -e "ssh -i $HOME/.ssh/id_ed25519 -o IdentitiesOnly=yes -o BatchMode=yes" \
            ./ "$VPS_USER@$VPS_HOST:/opt/global-digits-bot/"

      - name: Install, check, and reload bot
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o IdentitiesOnly=yes -o BatchMode=yes \
            "$VPS_USER@$VPS_HOST" \
            'chmod +x /opt/global-digits-bot/scripts/deploy.sh && /opt/global-digits-bot/scripts/deploy.sh'
